<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} · PyVmote</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            background: #ffffff;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: #1d1d1f;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
        }
        .viewer-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 22px;
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            z-index: 10;
            border-bottom: 1px solid #d2d2d7;
        }
        .viewer-header h1 {
            margin: 0;
            font-size: 0.98rem;
            font-weight: 600;
            color: #1d1d1f;
            letter-spacing: -0.01em;
        }
        .viewer-header a, .viewer-header button {
            background: #0071e3;
            color: #ffffff;
            border: none;
            padding: 7px 16px;
            font-size: 0.85rem;
            font-weight: 500;
            border-radius: 980px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background 0.18s ease;
            margin-left: 6px;
        }
        .viewer-header a:hover, .viewer-header button:hover { background: #0077ed; }
        .viewer-header a.secondary {
            background: #f5f5f7;
            color: #1d1d1f;
        }
        .viewer-header a.secondary:hover { background: #eaeaef; }
        .viewer-stage {
            position: absolute;
            inset: 56px 0 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            background: #ffffff;
            overflow: hidden;
        }
        .viewer-stage img {
            max-width: calc(100% - 32px);
            max-height: calc(100% - 32px);
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
        }
        .viewer-stage iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #ffffff;
            display: block;
        }
        @media (max-width: 700px) {
            .viewer-header { align-items: flex-start; gap: 8px; flex-direction: column; }
            .viewer-stage { inset: 96px 0 0 0; }
        }
    </style>

</head>
<body>
    <header class="viewer-header">
        <h1>{{ title }}</h1>
        <div>
            <a href="/static/images/{{ title }}.png" download>⬇ Descargar PNG</a>
            <a href="/preview" class="secondary">← Volver</a>
        </div>

    </header>
    <section class="viewer-stage">
        {% if kind == "html" %}
            <iframe src="/static/html/{{ title }}.html" title="{{ title }}" scrolling="no" allowfullscreen></iframe>
        {% else %}
            <img src="/static/images/{{ title }}.png" alt="{{ title }}">
        {% endif %}
    </section>
</body>
</html>
