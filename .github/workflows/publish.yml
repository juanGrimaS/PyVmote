name: Publicar en PyPI

# El flujo se activa cuando creas una "Release" (versión) en GitHub
on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    # 1. Descarga el código de tu repositorio
    - uses: actions/checkout@v4

    # 2. Configura Python en el servidor de GitHub
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Versión estable para empaquetar

    # 3. Instala las herramientas oficiales para compilar y subir paquetes
    - name: Instalar dependencias de empaquetado
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    # 4. Compila usando tu setup.py (crea carpetas dist/ con los archivos .whl y .tar.gz)
    - name: Construir paquete (sdist y wheel)
      run: python -m build

    # 5. Sube el paquete a PyPI de forma segura usando un Token
    - name: Publicar en PyPI
      run: twine upload dist/*
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
